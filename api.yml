openapi: 3.0.0
info:
  version: 1.0.0
  title: flsk_api
servers:
  - url: 'http://localhost:5000'
paths:
  /:
    get:
      summary: 'Home endpoint: Returns default return'
      operationId: home
      tags:
        - home
      responses:
        '200':
          description: 'Sample response: Default response format'
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/Response'
        default:
          description: Unexpected error
          content: 
            application/json:
              schema:
                  $ref: '#/components/schemas/Error'
  /user:
    get:
      summary: 'Sample endpoint: Returns details about a particular user'
      operationId: listUser
      tags:
        - user
      parameters:
        - name: id
          in: query
          description: ID of the user
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: 'Sample response: Details about a user by ID'
          headers:
            x-next:
              description: A link to the next page of responses
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Response:
      type: object
      required:
        - message
        - success
        - data
      properties:
        message:
          type: string
        success:
          type: boolean
        data:
          type: object
    User:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tag:
          type: string
    Error:
      type: object
      required:
        - success
        - message
        - data
      properties:
        message:
          type: string
        success:
          type: boolean
        data:
          type: object